---
# Matrix playbook: nios_dtc_monitor_http
# NOTE: The HTTP monitor has several server-side default fields (notably
# `request`, which NIOS normalizes to a full HTTP/1.1 request). We pass an
# explicit, already-normalized `request` so the lifecycle is idempotent.
- name: "MATRIX | nios_dtc_monitor_http"
  hosts: nios
  connection: local
  gather_facts: false
  vars:
    mon_name: refactor_https_monitor
    mon_request: "GET / HTTP/1.1\nConnection: close\n\n"
  tasks:
    - name: Cleanup (pre)
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Re-create (idempotent)
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment (idempotent)
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Delete
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete (idempotent)
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: "{{ mon_name }}"
        port: 443
        secure: true
        request: "{{ mon_request }}"
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert idempotence and changes
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_dtc_monitor_http matrix PASSED"
        fail_msg: "nios_dtc_monitor_http matrix FAILED"
