---
# Field-coverage: nios_aaaa_record
# Tests: name(ib_req), view(ib_req), ipv6addr(ib_req), ttl, extattrs, comment
- name: "FIELDS | nios_aaaa_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        ipv6addr: "fd00:beef::99"
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create AAAA record with all fields
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        view: default
        ipv6addr: "fd00:beef::99"
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        view: default
        ipv6addr: "fd00:beef::99"
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        view: default
        ipv6addr: "fd00:beef::99"
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        view: default
        ipv6addr: "fd00:beef::99"
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl to 600
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        view: default
        ipv6addr: "fd00:beef::99"
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        view: default
        ipv6addr: "fd00:beef::99"
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete AAAA record
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        ipv6addr: "fd00:beef::99"
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_aaaa_record:
        name: rf-aaaa.example.com
        ipv6addr: "fd00:beef::99"
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_aaaa_record fields PASSED"
        fail_msg: "nios_aaaa_record fields FAILED"
