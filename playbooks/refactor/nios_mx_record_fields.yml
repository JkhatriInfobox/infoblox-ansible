---
# Field-coverage: nios_mx_record
# Tests: name(ib_req), view(ib_req), mail_exchanger(ib_req), preference(ib_req), ttl, extattrs, comment
# NOTE: mail_exchanger and preference are ib_req — changing either creates a new object
- name: "FIELDS | nios_mx_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        mail_exchanger: rf-mail.example.com
        preference: 10
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create MX record with all fields
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        view: default
        mail_exchanger: rf-mail.example.com
        preference: 10
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        view: default
        mail_exchanger: rf-mail.example.com
        preference: 10
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        view: default
        mail_exchanger: rf-mail.example.com
        preference: 10
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        view: default
        mail_exchanger: rf-mail.example.com
        preference: 10
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl and extattrs
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        view: default
        mail_exchanger: rf-mail.example.com
        preference: 10
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        view: default
        mail_exchanger: rf-mail.example.com
        preference: 10
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete MX record
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        mail_exchanger: rf-mail.example.com
        preference: 10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_mx_record:
        name: example.com
        mail_exchanger: rf-mail.example.com
        preference: 10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_mx_record fields PASSED"
        fail_msg: "nios_mx_record fields FAILED"
