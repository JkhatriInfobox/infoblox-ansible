---
# Matrix playbook: nios_nsgroup_forwardstubserver (forward/stub server nsgroup lifecycle)
- name: "MATRIX | nios_nsgroup_forwardstubserver"
  hosts: nios
  connection: local
  gather_facts: false
  tasks:
    - name: Cleanup forwardstubserver group (pre)
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create forwardstubserver nsgroup
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        comment: created with ansible
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Re-create forwardstubserver nsgroup (idempotent)
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        comment: created with ansible
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment (idempotent)
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Delete forwardstubserver nsgroup
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete forwardstubserver nsgroup (idempotent)
      infoblox.nios_modules.nios_nsgroup_forwardstubserver:
        name: refactor_nsgroup_fss
        external_servers:
          - name: ns1.external.com
            address: 192.168.2.10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert idempotence and changes
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_nsgroup_forwardstubserver matrix PASSED"
        fail_msg: "nios_nsgroup_forwardstubserver matrix FAILED"
