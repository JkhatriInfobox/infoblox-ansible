---
# Field-coverage: nios_adminuser
# Tests: name(ib_req), admin_groups(ib_req), auth_type, comment, extattrs
# NOTE: admin_groups is ib_req — changing it would create a new object
# NOTE: password is never returned by WAPI so idempotency can only be tested
#       for non-password fields (comment, extattrs). Update tasks omit password.
- name: "FIELDS | nios_adminuser"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create admin user with all fields
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        auth_type: LOCAL
        password: "Infoblox@rftest1"
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Update comment (no password — tests non-secret field update)
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        auth_type: LOCAL
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        auth_type: LOCAL
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update extattrs
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        auth_type: LOCAL
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update extattrs — idempotent
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        auth_type: LOCAL
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete admin user
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_adminuser:
        name: rf-admin
        admin_groups:
          - admin-group
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_adminuser fields PASSED"
        fail_msg: "nios_adminuser fields FAILED"
