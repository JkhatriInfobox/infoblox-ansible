---
# Matrix playbook: nios_nsgroup_delegation (nameserver delegation group lifecycle)
- name: "MATRIX | nios_nsgroup_delegation"
  hosts: nios
  connection: local
  gather_facts: false
  tasks:
    - name: Cleanup delegation group (pre)
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create delegation nsgroup
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        comment: created with ansible
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Re-create delegation nsgroup (idempotent)
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        comment: created with ansible
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment (idempotent)
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Delete delegation nsgroup
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete delegation nsgroup (idempotent)
      infoblox.nios_modules.nios_nsgroup_delegation:
        name: refactor_nsgroup_deleg
        delegate_to:
          - name: ns1.example.com
            address: 192.168.1.10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert idempotence and changes
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_nsgroup_delegation matrix PASSED"
        fail_msg: "nios_nsgroup_delegation matrix FAILED"
