---
# Field-coverage: nios_network
# Tests: network(ib_req), network_view(ib_req), container, comment, extattrs,
#        options (routers with use_option=true)
- name: "FIELDS | nios_network"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup network
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create network with all fields
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        network_view: default
        comment: field-test
        extattrs:
          Site: FieldTest
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        network_view: default
        comment: field-test
        extattrs:
          Site: FieldTest
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        network_view: default
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        network_view: default
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update DHCP option (routers) and extattrs
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        network_view: default
        comment: field-test-updated
        extattrs:
          Site: Updated
        options:
          - name: routers
            value: 192.168.98.254
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update options — idempotent
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        network_view: default
        comment: field-test-updated
        extattrs:
          Site: Updated
        options:
          - name: routers
            value: 192.168.98.254
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete network
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_network fields PASSED"
        fail_msg: "nios_network fields FAILED"
