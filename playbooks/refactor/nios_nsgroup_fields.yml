---
# Field-coverage: nios_nsgroup
# Tests: name(ib_req), grid_primary (lead, stealth), comment, extattrs
- name: "FIELDS | nios_nsgroup"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create nsgroup with all fields
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        grid_primary:
          - name: "{{ grid_member }}"
            lead: true
            stealth: false
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        grid_primary:
          - name: "{{ grid_member }}"
            lead: true
            stealth: false
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        grid_primary:
          - name: "{{ grid_member }}"
            lead: true
            stealth: false
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        grid_primary:
          - name: "{{ grid_member }}"
            lead: true
            stealth: false
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update extattrs and toggle stealth
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        grid_primary:
          - name: "{{ grid_member }}"
            lead: true
            stealth: false
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update — idempotent
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        grid_primary:
          - name: "{{ grid_member }}"
            lead: true
            stealth: false
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete nsgroup
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_nsgroup:
        name: rf-nsgroup-fields
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_nsgroup fields PASSED"
        fail_msg: "nios_nsgroup fields FAILED"
