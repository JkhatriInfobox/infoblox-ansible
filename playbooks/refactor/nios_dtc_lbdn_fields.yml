---
# Field-coverage: nios_dtc_lbdn
# Tests: name(ib_req), lb_method(ib_req!), auth_zones, pools, ttl, comment, extattrs
# lb_method is ib_req — changing it creates a new LBDN. We test comment/ttl/extattrs updates.
- name: "FIELDS | nios_dtc_lbdn"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    # Prereqs
    - name: Pre-cleanup LBDN
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        state: absent
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup pool prereq
      infoblox.nios_modules.nios_dtc_pool:
        name: rf-dtc-pool-lbdn-fields
        lb_preferred_method: ROUND_ROBIN
        state: absent
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup server prereq
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-srv-lbdn-fields
        host: 192.168.99.60
        state: absent
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup zone prereq
      infoblox.nios_modules.nios_zone:
        fqdn: rf-dtc-lbdn-fields.example.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Prereq — create auth zone with grid primary
      infoblox.nios_modules.nios_zone:
        fqdn: rf-dtc-lbdn-fields.example.com
        grid_primary:
          - name: "{{ grid_member }}"
        state: present
        provider: "{{ nios_provider }}"

    - name: Prereq — create DTC server
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-srv-lbdn-fields
        host: 192.168.99.60
        state: present
        provider: "{{ nios_provider }}"

    - name: Prereq — create DTC pool
      infoblox.nios_modules.nios_dtc_pool:
        name: rf-dtc-pool-lbdn-fields
        lb_preferred_method: ROUND_ROBIN
        servers:
          - server: rf-dtc-srv-lbdn-fields
            ratio: 1
        state: present
        provider: "{{ nios_provider }}"

    - name: Create LBDN with all fields
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        auth_zones:
          - fqdn: rf-dtc-lbdn-fields.example.com
            view: default
        pools:
          - pool: rf-dtc-pool-lbdn-fields
            ratio: 1
        patterns:
          - "*.rf-dtc-lbdn-fields.example.com"
        types:
          - A
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        auth_zones:
          - fqdn: rf-dtc-lbdn-fields.example.com
            view: default
        pools:
          - pool: rf-dtc-pool-lbdn-fields
            ratio: 1
        patterns:
          - "*.rf-dtc-lbdn-fields.example.com"
        types:
          - A
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        auth_zones:
          - fqdn: rf-dtc-lbdn-fields.example.com
            view: default
        pools:
          - pool: rf-dtc-pool-lbdn-fields
            ratio: 1
        patterns:
          - "*.rf-dtc-lbdn-fields.example.com"
        types:
          - A
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        auth_zones:
          - fqdn: rf-dtc-lbdn-fields.example.com
            view: default
        pools:
          - pool: rf-dtc-pool-lbdn-fields
            ratio: 1
        patterns:
          - "*.rf-dtc-lbdn-fields.example.com"
        types:
          - A
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl and extattrs
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        auth_zones:
          - fqdn: rf-dtc-lbdn-fields.example.com
            view: default
        pools:
          - pool: rf-dtc-pool-lbdn-fields
            ratio: 1
        patterns:
          - "*.rf-dtc-lbdn-fields.example.com"
        types:
          - A
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        auth_zones:
          - fqdn: rf-dtc-lbdn-fields.example.com
            view: default
        pools:
          - pool: rf-dtc-pool-lbdn-fields
            ratio: 1
        patterns:
          - "*.rf-dtc-lbdn-fields.example.com"
        types:
          - A
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete LBDN
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_dtc_lbdn:
        name: rf-dtc-lbdn-fields
        lb_method: ROUND_ROBIN
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Cleanup pool prereq
      infoblox.nios_modules.nios_dtc_pool:
        name: rf-dtc-pool-lbdn-fields
        lb_preferred_method: ROUND_ROBIN
        state: absent
        provider: "{{ nios_provider }}"

    - name: Cleanup server prereq
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-srv-lbdn-fields
        host: 192.168.99.60
        state: absent
        provider: "{{ nios_provider }}"

    - name: Cleanup zone prereq
      infoblox.nios_modules.nios_zone:
        fqdn: rf-dtc-lbdn-fields.example.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_dtc_lbdn fields PASSED"
        fail_msg: "nios_dtc_lbdn fields FAILED"
