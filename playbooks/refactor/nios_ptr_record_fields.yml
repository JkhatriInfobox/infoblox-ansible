---
# Field-coverage: nios_ptr_record
# Tests: view(ib_req), ipv4addr(ib_req), ptrdname(ib_req), ttl, extattrs, comment
# PTR records are looked up by IP so name is the reverse zone name, not settable directly
- name: "FIELDS | nios_ptr_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup PTR record
      infoblox.nios_modules.nios_ptr_record:
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create PTR record with all fields
      infoblox.nios_modules.nios_ptr_record:
        view: default
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_ptr_record:
        view: default
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_ptr_record:
        view: default
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_ptr_record:
        view: default
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl and extattrs
      infoblox.nios_modules.nios_ptr_record:
        view: default
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_ptr_record:
        view: default
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete PTR record
      infoblox.nios_modules.nios_ptr_record:
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_ptr_record:
        ipv4addr: 10.10.10.20
        ptrdname: rf-ptr.example.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_ptr_record fields PASSED"
        fail_msg: "nios_ptr_record fields FAILED"
