---
# Field-coverage: nios_range
# Tests: network(ib_req), network_view(ib_req), start_addr(ib_req), end_addr(ib_req),
#        comment, extattrs, options, new_end_addr (update via alias)
- name: "FIELDS | nios_range"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup range
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        start_addr: 192.168.98.100
        end_addr: 192.168.98.150
        state: absent
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup prereq network
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        state: absent
        provider: "{{ nios_provider }}"

    - name: Prereq — create parent network
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        comment: prereq for range fields
        state: present
        provider: "{{ nios_provider }}"

    - name: Create DHCP range with all fields
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        network_view: default
        start_addr: 192.168.98.100
        end_addr: 192.168.98.150
        comment: field-test
        extattrs:
          Site: FieldTest
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        network_view: default
        start_addr: 192.168.98.100
        end_addr: 192.168.98.150
        comment: field-test
        extattrs:
          Site: FieldTest
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment and extattrs
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        network_view: default
        start_addr: 192.168.98.100
        end_addr: 192.168.98.150
        comment: field-test-updated
        extattrs:
          Site: Updated
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        network_view: default
        start_addr: 192.168.98.100
        end_addr: 192.168.98.150
        comment: field-test-updated
        extattrs:
          Site: Updated
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Extend range end address using new_end_addr
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        network_view: default
        start_addr: 192.168.98.100
        end_addr: 192.168.98.150
        new_end_addr: 192.168.98.160
        comment: field-test-updated
        extattrs:
          Site: Updated
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-run without new_end_addr (now end is 160) — idempotent
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        network_view: default
        start_addr: 192.168.98.100
        end_addr: 192.168.98.160
        comment: field-test-updated
        extattrs:
          Site: Updated
        options:
          - name: routers
            value: 192.168.98.1
            use_option: true
            vendor_class: DHCP
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete range
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        start_addr: 192.168.98.100
        end_addr: 192.168.98.160
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_range:
        network: 192.168.98.0/24
        start_addr: 192.168.98.100
        end_addr: 192.168.98.160
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Cleanup prereq network
      infoblox.nios_modules.nios_network:
        network: 192.168.98.0/24
        state: absent
        provider: "{{ nios_provider }}"

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_range fields PASSED"
        fail_msg: "nios_range fields FAILED"
