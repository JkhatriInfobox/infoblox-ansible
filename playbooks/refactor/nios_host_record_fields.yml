---
# Field-coverage: nios_host_record
# Tests: name(ib_req), view(ib_req), ipv4addrs[ipv4addr,mac], aliases, ttl, extattrs, comment
# configure_for_dns is ib_req but defaults to true — we keep it at default
- name: "FIELDS | nios_host_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        ipv4addrs:
          - ipv4addr: 192.168.99.30
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create host record with all fields
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        view: default
        ipv4addrs:
          - ipv4addr: 192.168.99.30
            mac: "00:50:56:01:00:01"
            configure_for_dhcp: false
        aliases:
          - rf-alias.example.com
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        view: default
        ipv4addrs:
          - ipv4addr: 192.168.99.30
            mac: "00:50:56:01:00:01"
            configure_for_dhcp: false
        aliases:
          - rf-alias.example.com
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        view: default
        ipv4addrs:
          - ipv4addr: 192.168.99.30
            mac: "00:50:56:01:00:01"
            configure_for_dhcp: false
        aliases:
          - rf-alias.example.com
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        view: default
        ipv4addrs:
          - ipv4addr: 192.168.99.30
            mac: "00:50:56:01:00:01"
            configure_for_dhcp: false
        aliases:
          - rf-alias.example.com
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl and extattrs
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        view: default
        ipv4addrs:
          - ipv4addr: 192.168.99.30
            mac: "00:50:56:01:00:01"
            configure_for_dhcp: false
        aliases:
          - rf-alias.example.com
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        view: default
        ipv4addrs:
          - ipv4addr: 192.168.99.30
            mac: "00:50:56:01:00:01"
            configure_for_dhcp: false
        aliases:
          - rf-alias.example.com
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete host record
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        ipv4addrs:
          - ipv4addr: 192.168.99.30
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_host_record:
        name: rf-host.example.com
        ipv4addrs:
          - ipv4addr: 192.168.99.30
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_host_record fields PASSED"
        fail_msg: "nios_host_record fields FAILED"
