---
# Matrix playbook: nios_naptr_record
- name: "MATRIX | nios_naptr_record"
  hosts: nios
  connection: local
  gather_facts: false
  tasks:
    - name: Ensure parent zone
      infoblox.nios_modules.nios_zone:
        name: ansible-refactor.com
        state: present
        provider: "{{ nios_provider }}"

    - name: Cleanup (pre)
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Re-create (idempotent)
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update field
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update field (idempotent)
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Delete
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete (idempotent)
      infoblox.nios_modules.nios_naptr_record:
        name: "*.subscriber-100.ansible-refactor.com"
        order: 1000
        preference: 10
        replacement: replacement1.ansible-refactor.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Cleanup parent zone
      infoblox.nios_modules.nios_zone:
        name: ansible-refactor.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Assert idempotence and changes
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_naptr_record matrix PASSED"
        fail_msg: "nios_naptr_record matrix FAILED"
