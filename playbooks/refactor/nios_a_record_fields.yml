---
# Field-coverage: nios_a_record
# Tests every field: name(ib_req), view(ib_req), ipv4addr(ib_req), ttl, use_ttl, extattrs, comment
# NOTE: ib_req fields (name, view, ipv4addr) are immutable search keys — changing them creates a new object.
- name: "FIELDS | nios_a_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        ipv4addr: 192.168.99.10
        state: absent
        provider: "{{ nios_provider }}"

    # CREATE with all fields
    - name: Create A record with all fields
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    # UPDATE comment
    - name: Update comment
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    # UPDATE ttl
    - name: Update ttl to 600
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    # UPDATE extattrs
    - name: Update extattrs
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update5

    - name: Re-update extattrs — idempotent
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        view: default
        ipv4addr: 192.168.99.10
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update6

    # DELETE
    - name: Delete A record
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        ipv4addr: 192.168.99.10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_a_record:
        name: rf-a.example.com
        ipv4addr: 192.168.99.10
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - update5.changed
          - not update6.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_a_record fields PASSED"
        fail_msg: "nios_a_record fields FAILED"
