---
# Field-coverage: nios_txt_record
# Tests: name(ib_req), view(ib_req), text(ib_req — immutable), ttl, extattrs, comment
# NOTE: text is ib_req so updating it creates a new object — we test comment/ttl/extattrs updates
- name: "FIELDS | nios_txt_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        text: "v=spf1 include:example.com ~all"
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create TXT record with all fields
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        view: default
        text: "v=spf1 include:example.com ~all"
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        view: default
        text: "v=spf1 include:example.com ~all"
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        view: default
        text: "v=spf1 include:example.com ~all"
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        view: default
        text: "v=spf1 include:example.com ~all"
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl and extattrs
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        view: default
        text: "v=spf1 include:example.com ~all"
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update — idempotent
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        view: default
        text: "v=spf1 include:example.com ~all"
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete TXT record
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        text: "v=spf1 include:example.com ~all"
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_txt_record:
        name: rf-txt.example.com
        text: "v=spf1 include:example.com ~all"
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_txt_record fields PASSED"
        fail_msg: "nios_txt_record fields FAILED"
