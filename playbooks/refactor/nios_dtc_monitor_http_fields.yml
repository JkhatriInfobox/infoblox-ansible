---
# Field-coverage: nios_dtc_monitor_http
# Tests: name(ib_req), port, interval, retry_down, retry_up, timeout,
#        request (must be explicit due to WAPI normalization),
#        content_check, content_check_input, comment, extattrs
- name: "FIELDS | nios_dtc_monitor_http"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create HTTP monitor with all numeric/text fields
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        port: 8080
        interval: 10
        retry_down: 2
        retry_up: 2
        timeout: 20
        request: "GET /health HTTP/1.1\nConnection: close\n\n"
        content_check: NONE
        content_check_input: ALL
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        port: 8080
        interval: 10
        retry_down: 2
        retry_up: 2
        timeout: 20
        request: "GET /health HTTP/1.1\nConnection: close\n\n"
        content_check: NONE
        content_check_input: ALL
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update numeric fields (interval, timeout)
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        port: 8080
        interval: 15
        retry_down: 3
        retry_up: 3
        timeout: 30
        request: "GET /health HTTP/1.1\nConnection: close\n\n"
        content_check: NONE
        content_check_input: ALL
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update numeric fields — idempotent
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        port: 8080
        interval: 15
        retry_down: 3
        retry_up: 3
        timeout: 30
        request: "GET /health HTTP/1.1\nConnection: close\n\n"
        content_check: NONE
        content_check_input: ALL
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update extattrs
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        port: 8080
        interval: 15
        retry_down: 3
        retry_up: 3
        timeout: 30
        request: "GET /health HTTP/1.1\nConnection: close\n\n"
        content_check: NONE
        content_check_input: ALL
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update extattrs — idempotent
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        port: 8080
        interval: 15
        retry_down: 3
        retry_up: 3
        timeout: 30
        request: "GET /health HTTP/1.1\nConnection: close\n\n"
        content_check: NONE
        content_check_input: ALL
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete HTTP monitor
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_dtc_monitor_http:
        name: rf-dtc-http-fields
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_dtc_monitor_http fields PASSED"
        fail_msg: "nios_dtc_monitor_http fields FAILED"
