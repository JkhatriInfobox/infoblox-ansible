---
# Field-coverage: nios_cname_record
# Tests: name(ib_req), view(ib_req), canonical(ib_req — immutable), ttl, extattrs, comment
# canonical is ib_req so updating it would create a new object — we only verify set value
- name: "FIELDS | nios_cname_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup CNAME record
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        canonical: rf-cname-target.example.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup target A record
      infoblox.nios_modules.nios_a_record:
        name: rf-cname-target.example.com
        ipv4addr: 192.168.99.11
        state: absent
        provider: "{{ nios_provider }}"

    - name: Prereq — create canonical target A record
      infoblox.nios_modules.nios_a_record:
        name: rf-cname-target.example.com
        ipv4addr: 192.168.99.11
        state: present
        provider: "{{ nios_provider }}"

    - name: Create CNAME with all fields
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        view: default
        canonical: rf-cname-target.example.com
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        view: default
        canonical: rf-cname-target.example.com
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        view: default
        canonical: rf-cname-target.example.com
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        view: default
        canonical: rf-cname-target.example.com
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        view: default
        canonical: rf-cname-target.example.com
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        view: default
        canonical: rf-cname-target.example.com
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete CNAME record
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        canonical: rf-cname-target.example.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_cname_record:
        name: rf-cname.example.com
        canonical: rf-cname-target.example.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Cleanup target A record
      infoblox.nios_modules.nios_a_record:
        name: rf-cname-target.example.com
        ipv4addr: 192.168.99.11
        state: absent
        provider: "{{ nios_provider }}"

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_cname_record fields PASSED"
        fail_msg: "nios_cname_record fields FAILED"
