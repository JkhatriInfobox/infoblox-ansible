---
# Field-coverage: nios_vlan
# Tests: name(ib_req), id(ib_req), parent (non-req), comment, extattrs
# id and name are ib_req — updating either creates new. parent, comment, extattrs are updatable.
- name: "FIELDS | nios_vlan"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup VLAN
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create VLAN with all fields
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update extattrs
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update extattrs — idempotent
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete VLAN
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_vlan:
        name: rf-vlan-fields
        id: 900
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_vlan fields PASSED"
        fail_msg: "nios_vlan fields FAILED"
