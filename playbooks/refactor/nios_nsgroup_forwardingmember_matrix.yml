---
# Matrix playbook: nios_nsgroup_forwardingmember (forwarding member nsgroup lifecycle)
- name: "MATRIX | nios_nsgroup_forwardingmember"
  hosts: nios
  connection: local
  gather_facts: false
  tasks:
    - name: Cleanup forwarding member group (pre)
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create forwarding member nsgroup
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        comment: created with ansible
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Re-create forwarding member nsgroup (idempotent)
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        comment: created with ansible
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment (idempotent)
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Delete forwarding member nsgroup
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete forwarding member nsgroup (idempotent)
      infoblox.nios_modules.nios_nsgroup_forwardingmember:
        name: refactor_nsgroup_fwd
        forwarding_servers:
          - name: "{{ grid_member }}"
            forwarders_only: false
            forward_to: []
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert idempotence and changes
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_nsgroup_forwardingmember matrix PASSED"
        fail_msg: "nios_nsgroup_forwardingmember matrix FAILED"
