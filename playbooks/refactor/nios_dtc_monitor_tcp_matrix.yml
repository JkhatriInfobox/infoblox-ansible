---
# Matrix playbook: nios_dtc_monitor_tcp
# KNOWN PRE-EXISTING LIMITATION (not a refactor regression):
# On WAPI 2.13 the `port` field of dtc:monitor:tcp is NOT searchable, yet the
# module marks `port` as ib_req, so the object lookup issues a GET filtered by
# port and NIOS returns "400 Field is not searchable: port". This affects the
# original code identically. Tracked for a module-level fix (drop port from the
# search filter for dtc:monitor:tcp).
- name: "MATRIX | nios_dtc_monitor_tcp"
  hosts: nios
  connection: local
  gather_facts: false
  tasks:
    - name: Cleanup (pre)
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Re-create (idempotent)
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update field
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update field (idempotent)
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        comment: this is a test comment
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Delete
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete (idempotent)
      infoblox.nios_modules.nios_dtc_monitor_tcp:
        name: refactor_tcp_monitor
        port: 8080
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert idempotence and changes
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_dtc_monitor_tcp matrix PASSED"
        fail_msg: "nios_dtc_monitor_tcp matrix FAILED"
