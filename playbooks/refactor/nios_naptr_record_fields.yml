---
# Field-coverage: nios_naptr_record
# Tests: name(ib_req), view(ib_req), order(ib_req), preference(ib_req), replacement(ib_req),
#        services, flags, regexp, ttl, extattrs, comment
- name: "FIELDS | nios_naptr_record"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        order: 10
        preference: 20
        replacement: rf-target.example.com
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create NAPTR record with all fields
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        view: default
        order: 10
        preference: 20
        replacement: rf-target.example.com
        services: "SIP+D2U"
        flags: "U"
        regexp: ""
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        view: default
        order: 10
        preference: 20
        replacement: rf-target.example.com
        services: "SIP+D2U"
        flags: "U"
        regexp: ""
        ttl: 300
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update services, flags, comment
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        view: default
        order: 10
        preference: 20
        replacement: rf-target.example.com
        services: "SIP+D2T"
        flags: "S"
        regexp: ""
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update — idempotent
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        view: default
        order: 10
        preference: 20
        replacement: rf-target.example.com
        services: "SIP+D2T"
        flags: "S"
        regexp: ""
        ttl: 300
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update ttl and extattrs
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        view: default
        order: 10
        preference: 20
        replacement: rf-target.example.com
        services: "SIP+D2T"
        flags: "S"
        regexp: ""
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update ttl — idempotent
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        view: default
        order: 10
        preference: 20
        replacement: rf-target.example.com
        services: "SIP+D2T"
        flags: "S"
        regexp: ""
        ttl: 600
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete NAPTR record
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        order: 10
        preference: 20
        replacement: rf-target.example.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_naptr_record:
        name: rf-naptr.example.com
        order: 10
        preference: 20
        replacement: rf-target.example.com
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_naptr_record fields PASSED"
        fail_msg: "nios_naptr_record fields FAILED"
