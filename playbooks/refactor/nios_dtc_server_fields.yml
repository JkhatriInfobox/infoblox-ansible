---
# Field-coverage: nios_dtc_server
# Tests: name(ib_req), host(ib_req), comment, extattrs
- name: "FIELDS | nios_dtc_server"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    - name: Pre-cleanup
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create DTC server with all fields
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create1

    - name: Create again — idempotent
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        comment: field-test
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: create2

    - name: Update comment
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update1

    - name: Re-update comment — idempotent
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        comment: field-test-updated
        extattrs:
          Site: FieldTest
        state: present
        provider: "{{ nios_provider }}"
      register: update2

    - name: Update extattrs
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update3

    - name: Re-update extattrs — idempotent
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        comment: field-test-updated
        extattrs:
          Site: Updated
        state: present
        provider: "{{ nios_provider }}"
      register: update4

    - name: Delete DTC server
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        state: absent
        provider: "{{ nios_provider }}"
      register: delete1

    - name: Re-delete — idempotent
      infoblox.nios_modules.nios_dtc_server:
        name: rf-dtc-server-fields
        host: 192.168.99.50
        state: absent
        provider: "{{ nios_provider }}"
      register: delete2

    - name: Assert all field operations
      ansible.builtin.assert:
        that:
          - create1.changed
          - not create2.changed
          - update1.changed
          - not update2.changed
          - update3.changed
          - not update4.changed
          - delete1.changed
          - not delete2.changed
        success_msg: "nios_dtc_server fields PASSED"
        fail_msg: "nios_dtc_server fields FAILED"
