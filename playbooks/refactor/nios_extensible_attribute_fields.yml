---
# Field-coverage: nios_extensible_attribute
# Tests: STRING type (all sub-fields), INTEGER type (min/max), LIST type (list_values)
- name: "FIELDS | nios_extensible_attribute"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Ensure "Site" EA exists (required for extattrs tests)
      infoblox.nios_modules.nios_extensible_attribute:
        name: Site
        type: STRING
        state: present
        provider: "{{ nios_provider }}"

    # ---- STRING EA ----
    - name: Pre-cleanup STRING EA
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create STRING EA with all fields
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        type: STRING
        comment: field-test
        default_value: mydefault
        state: present
        provider: "{{ nios_provider }}"
      register: create_str1

    - name: Create STRING EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        type: STRING
        comment: field-test
        default_value: mydefault
        state: present
        provider: "{{ nios_provider }}"
      register: create_str2

    - name: Update STRING EA comment and default_value
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        type: STRING
        comment: field-test-updated
        default_value: newdefault
        state: present
        provider: "{{ nios_provider }}"
      register: update_str1

    - name: Re-update STRING EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        type: STRING
        comment: field-test-updated
        default_value: newdefault
        state: present
        provider: "{{ nios_provider }}"
      register: update_str2

    - name: Delete STRING EA
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        state: absent
        provider: "{{ nios_provider }}"
      register: delete_str1

    - name: Re-delete STRING EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-string
        state: absent
        provider: "{{ nios_provider }}"
      register: delete_str2

    # ---- INTEGER EA ----
    - name: Pre-cleanup INTEGER EA
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create INTEGER EA with min/max
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        type: INTEGER
        comment: field-test
        default_value: "5"
        min: 0
        max: 100
        state: present
        provider: "{{ nios_provider }}"
      register: create_int1

    - name: Create INTEGER EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        type: INTEGER
        comment: field-test
        default_value: "5"
        min: 0
        max: 100
        state: present
        provider: "{{ nios_provider }}"
      register: create_int2

    - name: Update INTEGER EA default and max
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        type: INTEGER
        comment: field-test-updated
        default_value: "10"
        min: 0
        max: 200
        state: present
        provider: "{{ nios_provider }}"
      register: update_int1

    - name: Re-update INTEGER EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        type: INTEGER
        comment: field-test-updated
        default_value: "10"
        min: 0
        max: 200
        state: present
        provider: "{{ nios_provider }}"
      register: update_int2

    - name: Delete INTEGER EA
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        state: absent
        provider: "{{ nios_provider }}"
      register: delete_int1

    - name: Re-delete INTEGER EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-integer
        state: absent
        provider: "{{ nios_provider }}"
      register: delete_int2

    # ---- LIST EA ----
    - name: Pre-cleanup LIST EA
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        state: absent
        provider: "{{ nios_provider }}"

    - name: Create LIST EA with list_values
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        type: ENUM
        comment: field-test
        default_value: prod
        list_values:
          - prod
          - dev
        state: present
        provider: "{{ nios_provider }}"
      register: create_list1

    - name: Create LIST EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        type: ENUM
        comment: field-test
        default_value: prod
        list_values:
          - prod
          - dev
        state: present
        provider: "{{ nios_provider }}"
      register: create_list2

    - name: Update LIST EA — add value
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        type: ENUM
        comment: field-test-updated
        default_value: prod
        list_values:
          - prod
          - dev
          - staging
        state: present
        provider: "{{ nios_provider }}"
      register: update_list1

    - name: Re-update LIST EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        type: ENUM
        comment: field-test-updated
        default_value: prod
        list_values:
          - prod
          - dev
          - staging
        state: present
        provider: "{{ nios_provider }}"
      register: update_list2

    - name: Delete LIST EA
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        state: absent
        provider: "{{ nios_provider }}"
      register: delete_list1

    - name: Re-delete LIST EA — idempotent
      infoblox.nios_modules.nios_extensible_attribute:
        name: rf-ea-list
        state: absent
        provider: "{{ nios_provider }}"
      register: delete_list2

    - name: Assert all EA field operations
      ansible.builtin.assert:
        that:
          - create_str1.changed
          - not create_str2.changed
          - update_str1.changed
          - not update_str2.changed
          - delete_str1.changed
          - not delete_str2.changed
          - create_int1.changed
          - not create_int2.changed
          - update_int1.changed
          - not update_int2.changed
          - delete_int1.changed
          - not delete_int2.changed
          - create_list1.changed
          - not create_list2.changed
          - update_list1.changed
          - not update_list2.changed
          - delete_list1.changed
          - not delete_list2.changed
        success_msg: "nios_extensible_attribute fields PASSED"
        fail_msg: "nios_extensible_attribute fields FAILED"
